version: "3.8"

services:
  homevault:
    profiles:
      - containerized
    build:
      context: .
      dockerfile: Dockerfile
    container_name: homevault
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: info
      DATABASE_URL: file:/data/homevault.db
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      API_CORS_ORIGIN: ${API_CORS_ORIGIN:-*}
      DATA_DIR: /data
      STORAGE_BASE_PATH: ${STORAGE_BASE_PATH:-/data}
      HOMEVAULT_REMOTE_ROOT: ${HOMEVAULT_REMOTE_ROOT:-/opt/homevault/remote}
      HOMEVAULT_UPDATE_BRANCH: ${HOMEVAULT_UPDATE_BRANCH:-main}
      HOMEVAULT_SERVICE_NAME: ${HOMEVAULT_SERVICE_NAME:-homevault}
    volumes:
      - ${HOMEVAULT_DATA_ROOT:-/opt/homevault/data}:/data
      - ${HOMEVAULT_LOG_ROOT:-/opt/homevault/logs}:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - homevault-network
    depends_on:
      adguardhome:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 512M
        reservations:
          cpus: "1"
          memory: 256M

  adguardhome:
    image: adguard/adguardhome:latest
    container_name: homevault-adguard
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "67:67/udp"
      - "68:68/tcp"
      - "68:68/udp"
      - "3001:3000/tcp"
      - "853:853/tcp"
      - "784:784/udp"
    volumes:
      - ${HOMEVAULT_DATA_ROOT:-/opt/homevault/data}/adguard/work:/opt/adguardhome/work
      - ${HOMEVAULT_DATA_ROOT:-/opt/homevault/data}/adguard/conf:/opt/adguardhome/conf
    networks:
      - homevault-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  backup-cron:
    image: alpine:latest
    container_name: homevault-db-backup
    restart: unless-stopped
    volumes:
      - ${HOMEVAULT_DATA_ROOT:-/opt/homevault/data}:/data
      - ${HOMEVAULT_BACKUP_ROOT:-/opt/homevault/backups}:/backups
    entrypoint: >
      sh -c '
      while true; do
        echo "Realizando backup de base de datos...";
        if [ -f /data/homevault.db ]; then
          cp /data/homevault.db /backups/homevault-$(date +%s).db.bak;
        fi;
        ls -1 /backups/homevault-*.db.bak 2>/dev/null | sort -r | tail -n +11 | xargs -r rm;
        echo "Backup completado";
        sleep 21600;
      done
      '
    networks:
      - homevault-network

networks:
  homevault-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

volumes:
  homevault-data:
    driver: local
